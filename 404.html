<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Strona nie znaleziona | Restauracja Emilio</title>
  <meta name="description" content="Strona nie została znaleziona. Wróć na stronę główną Restauracji Emilio — autentyczna kuchnia włoska w Szczecinie.">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/png" href="images/logo-white.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Source+Sans+Pro:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0b0b0b;
      --burgundy: #3d0a05;
      --burg-light: #5a1810;
      --ff-display: 'Cormorant Garamond', Georgia, serif;
      --ff-body: 'Source Sans Pro', -apple-system, Helvetica, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--ff-body);
      background: var(--black);
      color: #faf9f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--burgundy);
      z-index: 9999;
    }

    .error-code {
      font-family: var(--ff-display);
      font-size: clamp(120px, 25vw, 220px);
      font-weight: 300;
      color: rgba(255, 255, 255, .06);
      line-height: 1;
      margin-bottom: -20px;
      letter-spacing: -.03em;
      user-select: none;
    }

    .error-kicker {
      font-family: var(--ff-display);
      font-size: 15px;
      font-style: italic;
      letter-spacing: .2em;
      color: #c4837c;
      margin-bottom: 16px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, .5);
    }

    .error-title {
      font-family: var(--ff-display);
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 300;
      color: #fff;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .error-desc {
      font-size: 16px;
      font-weight: 400;
      color: rgba(255, 255, 255, .55);
      max-width: 460px;
      margin: 0 auto 36px;
      line-height: 1.75;
    }

    .error-links {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 34px;
      font-family: var(--ff-body);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: all .3s cubic-bezier(.4, 0, .2, 1);
      background: var(--burgundy);
      color: #fff;
    }

    .btn:hover {
      background: var(--burg-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(61, 10, 5, .35);
    }

    .btn--ghost {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, .25);
    }

    .btn--ghost:hover {
      background: rgba(255, 255, 255, .06);
      border-color: rgba(255, 255, 255, .5);
      box-shadow: none;
    }

    .error-logo {
      height: 48px;
      opacity: .3;
      transition: opacity .3s;
    }

    .error-logo:hover {
      opacity: .6;
    }

    .error-contact {
      font-size: 13px;
      color: rgba(255, 255, 255, .35);
      margin-top: 12px;
    }

    .error-contact a {
      color: rgba(255, 255, 255, .5);
      text-decoration: none;
      transition: color .2s;
    }

    .error-contact a:hover {
      color: #fff;
    }
  </style>
</head>

<body>
  <div class="error-code">404</div>
  <p class="error-kicker">pagina non trovata</p>
  <h1 class="error-title">Ups! Ta strona nie istnieje</h1>
  <p class="error-desc">Wygląda na to, że zabłądziłeś. Strona, której szukasz, mogła zostać przeniesiona lub nie istnieje. Wróć do restauracji — stół czeka!</p>

  <div class="error-links">
    <a href="index.html" class="btn">Strona główna</a>
    <a href="pages/menu.html" class="btn btn--ghost">Zobacz menu</a>
  </div>

  <a href="index.html">
    <img src="images/logo-white.png" alt="Restauracja Emilio Szczecin" class="error-logo">
  </a>
  <p class="error-contact">Potrzebujesz pomocy? <a href="tel:+48508224177">+48 508 224 177</a></p>
</body>

</html>
